
# --- DEV PROFILE (local, sin MySQL) ---
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.datasource.jdbc.url=jdbc:h2:file:./dev-data;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
%dev.quarkus.hibernate-orm.schema-management.strategy=update
%dev.firebase.credentials=/Users/aislinn/firebase/firebase-admin.json

# --- TEST PROFILE ---
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# firebase.credentials en test: omitido en test/resources/application.properties (Optional.empty)
# Avoid conflict with Expo/Metro bundler which uses 8081 by default
quarkus.http.test.port=8090

# --- CONFIGURACIÓN PARA CLOUD RUN ---
quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}

# --- DATASOURCE ---
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update

# Firebase
firebase.credentials=${FIREBASE_CREDENTIALS}

# CORS
quarkus.http.cors.origins=http://localhost:8081,http://localhost:8082,http://localhost:3000,http://localhost:19006,http://localhost:19000,http://localhost:8080,https://todo-web-orcin.vercel.app
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true
